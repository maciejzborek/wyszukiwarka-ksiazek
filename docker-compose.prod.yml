version: "3.9"

# Production compose file used on EC2.
# Required env vars:
#   ECR_IMAGE    – full ECR image URI including tag
#   APP_VERSION  – version string (e.g. git SHA)

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /opt/book-search-api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    image: ${ECR_IMAGE}
    expose:
      - "8000"
    environment:
      - APP_VERSION=${APP_VERSION}
    restart: unless-stopped
