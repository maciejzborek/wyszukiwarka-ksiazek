name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: wyszukiwarka-ksiazek
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run tests
        run: pytest app/test_main.py -v

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $IMAGE -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $IMAGE
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_IMAGE: ${{ steps.build.outputs.image }}
          APP_VERSION: ${{ env.IMAGE_TAG }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_IMAGE,APP_VERSION,AWS_REGION
          script: |
            # Pobierz najnowsze pliki konfiguracyjne z GitHub
            GITHUB_RAW="https://raw.githubusercontent.com/maciejzborek/wyszukiwarka-ksiazek/main"
            curl -fsSL "$GITHUB_RAW/docker-compose.prod.yml" -o /opt/book-search-api/docker-compose.prod.yml
            curl -fsSL "$GITHUB_RAW/nginx/nginx.conf"        -o /opt/book-search-api/nginx.conf

            # Zaktualizuj .env z nowym obrazem i wersją
            cat > /opt/book-search-api/.env << EOF
            ECR_IMAGE=$ECR_IMAGE
            APP_VERSION=$APP_VERSION
            AWS_REGION=$AWS_REGION
            EOF

            # Zaloguj do ECR i zrestartuj serwis
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            sudo systemctl restart book-search-api

            # Poczekaj chwilę i sprawdź status
            sleep 5
            sudo systemctl is-active book-search-api

            # Wyczyść stare obrazy
            docker image prune -f
